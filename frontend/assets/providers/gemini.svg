<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gemini-gradient" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#4796E3"/>
      <stop offset="40%" stop-color="#9168C0"/>
      <stop offset="70%" stop-color="#D96570"/>
      <stop offset="100%" stop-color="#F9AB55"/>
    </linearGradient>
  </defs>
  <!-- Gemini "spark" 四角星:4 个尖锐 lobe 从中心向外延伸,
       lobe 之间用凹曲线连接(每段的 quadratic 控制点贴近中心) -->
  <path d="M50 4
           Q 55 45 96 50
           Q 55 55 50 96
           Q 45 55 4 50
           Q 45 45 50 4
           Z"
        fill="url(#gemini-gradient)"/>
</svg>
