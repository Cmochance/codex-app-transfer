name: ci

# 回归门禁:Python replay smoke + Rust 工作区编译/测试。
# Leptos UI WASM 构建 job 已废弃(v2.0.0 改用 frontend/ + cas:// scheme,Leptos 弃案)。
# 详见 docs/migration-plan.md(Stage 6 架构调整)与 docs/cleanup-plan.md(Phase 1)。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-replay-tests:
    name: Python · replay smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio respx

      - name: Run replay smoke tests
        run: pytest tests/test_replay_smoke.py -v

  rust-workspace-check:
    name: Rust · workspace cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo fmt --check (workspace)
        run: cargo fmt --all -- --check

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      # registry 的契约测试需要 Python 生成的 fixture;CI 重生一次并 diff,
      # 防止有人改了 backend/config.py 却忘了刷新 fixture(详见
      # crates/registry/tests/python_compat.rs)
      - name: Setup Python (for registry fixture regeneration)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Regenerate registry fixtures and verify clean
        run: |
          python scripts/gen_registry_fixtures.py
          if ! git diff --exit-code -- tests/replay/fixtures/registry/; then
            echo "::error::Python 端 backend/config.py 改动未刷新 fixtures。请本地跑 \`python scripts/gen_registry_fixtures.py\` 并提交结果。"
            exit 1
          fi

      - name: cargo test --workspace
        run: cargo test --workspace --no-fail-fast
