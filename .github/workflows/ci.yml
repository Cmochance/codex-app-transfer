name: ci

# 回归门禁:Python replay smoke + Rust 工作区编译/测试。
# Leptos UI WASM 构建 job 已废弃(v2.0.0 改用 frontend/ + cas:// scheme,Leptos 弃案)。
# 详见 docs/migration-plan.md(Stage 6 架构调整)与 docs/cleanup-plan.md(Phase 1)。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-replay-tests:
    name: Python · replay smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio respx

      - name: Run replay smoke tests
        run: pytest tests/test_replay_smoke.py -v

  rust-workspace-check:
    name: Rust · workspace cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo fmt --check (workspace)
        run: cargo fmt --all -- --check

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      # 旧的"Python 重生 registry fixture → diff"步骤已删:
      # backend/ 在 Phase 1 被移除后,gen_registry_fixtures.py 失去数据源。
      # crates/registry/tests/python_compat.rs 仍读已 commit 的 fixture 做
      # round-trip 校验。Phase 3 会用 xtask gen-fixtures 重建反向校验。
      # 详见 docs/cleanup-plan.md。

      - name: cargo test --workspace
        run: cargo test --workspace --no-fail-fast
