name: ci

# Stage 0 起的回归门禁:Python 测试 + Rust 工作区编译 + Leptos UI WASM 构建。
# 后续 Stage 1-7 每次提交都会跑这套,作为方案验收最低基线。
# 详见 docs/migration-plan.md。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-replay-tests:
    name: Python · replay smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio respx

      - name: Run replay smoke tests
        run: pytest tests/test_replay_smoke.py -v

  rust-workspace-check:
    name: Rust · workspace cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo fmt --check (workspace)
        run: cargo fmt --all -- --check

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      # registry 的契约测试需要 Python 生成的 fixture;CI 重生一次并 diff,
      # 防止有人改了 backend/config.py 却忘了刷新 fixture(详见
      # crates/registry/tests/python_compat.rs)
      - name: Setup Python (for registry fixture regeneration)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Regenerate registry fixtures and verify clean
        run: |
          python scripts/gen_registry_fixtures.py
          if ! git diff --exit-code -- tests/replay/fixtures/registry/; then
            echo "::error::Python 端 backend/config.py 改动未刷新 fixtures。请本地跑 \`python scripts/gen_registry_fixtures.py\` 并提交结果。"
            exit 1
          fi

      - name: cargo test --workspace
        run: cargo test --workspace --no-fail-fast

  ui-wasm-build:
    name: Leptos UI · trunk build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain (with wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo (UI)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "ui -> target"

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: "latest"

      - name: trunk build (release)
        working-directory: ui
        run: trunk build --release

      - name: Check WASM size budget (≤ 500 KB after release+wasm-opt)
        working-directory: ui/dist
        run: |
          set -euo pipefail
          wasm_file=$(ls *.wasm | head -n 1)
          size=$(stat -c%s "$wasm_file")
          echo "wasm: $wasm_file = $size bytes"
          # 500 KB upper bound;Stage 6 验收;超出会失败,提醒优化
          if [ "$size" -gt 512000 ]; then
            echo "::warning::WASM size $size exceeds 500 KB soft budget (will hard-fail at Stage 6 verification)"
          fi
