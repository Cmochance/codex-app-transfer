<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codex App Transfer · 诊断流量查看器</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1f232c; --border: #2a2f3a;
    --fg: #e6e8ec; --muted: #8b93a1; --accent: #4f9cf9; --ok: #3fb950;
    --warn: #d29922; --err: #f85149; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  header { display: flex; align-items: center; gap: 12px; padding: 8px 14px;
    background: var(--panel); border-bottom: 1px solid var(--border); flex: none; }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; }
  header .grow { flex: 1; }
  #live { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); font-size: 12px; }
  #live .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  #live.on .dot { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  select, input, button { background: var(--panel2); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
  input#q { width: 200px; }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  main { flex: 1; display: flex; min-height: 0; }
  #list { width: 42%; max-width: 560px; overflow-y: auto; border-right: 1px solid var(--border); }
  .row { padding: 7px 12px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex;
    gap: 8px; align-items: baseline; }
  .row:hover { background: var(--panel); }
  .row.sel { background: var(--panel2); }
  .row .ts { color: var(--muted); font: 11px var(--mono); flex: none; }
  .row .badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; flex: none; text-transform: uppercase; }
  .badge.forward { background: #14304d; color: var(--accent); }
  .badge.mcp { background: #3a2a14; color: var(--warn); }
  .badge.cat_webfetch { background: #14402a; color: var(--ok); }
  .row .summary { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font: 12px var(--mono); }
  .row .status { flex: none; font: 11px var(--mono); }
  .st2 { color: var(--ok); } .st4, .st5 { color: var(--err); }
  #detail { flex: 1; overflow-y: auto; padding: 14px; }
  #detail .empty { color: var(--muted); margin-top: 40px; text-align: center; }
  .meta { color: var(--muted); font: 11px var(--mono); margin-bottom: 12px; word-break: break-all; }
  .seg { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .seg > summary { cursor: pointer; padding: 7px 12px; background: var(--panel); font-weight: 600;
    list-style: none; display: flex; justify-content: space-between; }
  .seg > summary::-webkit-details-marker { display: none; }
  .seg .body { padding: 10px 12px; }
  table.hdr { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  table.hdr td { padding: 2px 6px; vertical-align: top; font: 11px var(--mono); border-bottom: 1px solid var(--border); }
  table.hdr td.k { color: var(--accent); width: 30%; word-break: break-all; }
  table.hdr td.v { color: var(--fg); word-break: break-all; }
  pre.payload { margin: 0; padding: 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; overflow-x: auto; font: 11px var(--mono); white-space: pre-wrap; word-break: break-word;
    max-height: 420px; overflow-y: auto; }
  .trunc { color: var(--warn); font-size: 11px; margin-top: 4px; }
  .tools { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .tools button { font-size: 11px; padding: 3px 8px; }
  .tools button.done { border-color: var(--ok); color: var(--ok); }
  pre.diff .del { color: var(--err); }
  pre.diff .add { color: var(--ok); }
  pre.diff .ctx { color: var(--muted); }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>诊断流量查看器</h1>
    <span id="live"><span class="dot"></span><span id="livetxt">连接中…</span></span>
    <span class="grow"></span>
    <select id="kind">
      <option value="all">全部</option>
      <option value="forward">forward</option>
      <option value="mcp">mcp</option>
      <option value="cat_webfetch">cat-webfetch</option>
    </select>
    <input id="q" type="search" placeholder="搜 path / provider / url…" />
    <button id="clear">清空</button>
  </header>
  <main>
    <div id="list"></div>
    <div id="detail"><div class="empty">选择左侧一条记录查看详情</div></div>
  </main>
</div>
<script>
(function () {
  const $ = (s) => document.querySelector(s);
  const listEl = $("#list"), detailEl = $("#detail"), liveEl = $("#live"), liveTxt = $("#livetxt");
  let traces = [];          // 全部记录(value 对象)
  let selected = null;      // 当前选中的 seq

  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  function kindOf(t) {
    if (!t) return "mcp";
    if (t.trace_kind === "forward_protocol") return "forward";
    if (t.trace_kind === "cat_webfetch") return "cat_webfetch";
    return "mcp";
  }

  function summaryOf(t) {
    const k = kindOf(t);
    if (k === "forward") {
      const ib = t.inbound || {};
      return `${esc(ib.method || "")} ${esc(ib.client_path || "")}`;
    }
    if (k === "cat_webfetch") {
      const r = t.request || {};
      return `${esc(t.tool || "")} ${esc(r.url || r.query || "")}`;
    }
    return `${esc((t.event || "mcp"))} ${esc(t.url || "")}`;
  }
  function statusOf(t) {
    if (kindOf(t) === "cat_webfetch") {
      const f = t.fetch || {}, r = t.result || {};
      if (f.status != null) return f.status;
      return r.is_error ? "err" : "ok";
    }
    return (t.response && t.response.status) || t.status || "";
  }

  function matches(t) {
    const k = $("#kind").value;
    if (k !== "all" && kindOf(t) !== k) return false;
    const q = $("#q").value.trim().toLowerCase();
    if (!q) return true;
    return JSON.stringify(t).toLowerCase().includes(q);
  }

  function renderList() {
    const rows = traces.filter(matches);
    listEl.innerHTML = rows.map((t) => {
      const k = kindOf(t), st = statusOf(t);
      const stCls = st ? "st" + String(st)[0] : "";
      const ts = (t.captured_at || "").replace("T", " ").slice(5, 19);
      return `<div class="row ${t.seq === selected ? "sel" : ""}" data-seq="${t.seq}">
        <span class="ts">${esc(ts)}</span>
        <span class="badge ${k}">${k}</span>
        <span class="summary">${summaryOf(t)}</span>
        <span class="status ${stCls}">${esc(st)}</span>
      </div>`;
    }).join("");
  }

  function bodyBlock(b) {
    if (!b) return "<pre class='payload'>(无)</pre>";
    let content = b.content;
    if (content == null && b.encoding === "json_truncated_omitted") {
      content = "(大 JSON 被 tee 截断、无法脱敏 → 正文省略)";
    } else if (typeof content === "object") {
      content = JSON.stringify(content, null, 2);
    }
    const trunc = b.truncated_bytes > 0
      ? `<div class="trunc">⚠ 截断:原始 ${b.bytes} 字节,丢弃 ${b.truncated_bytes}(encoding=${esc(b.encoding)})</div>`
      : "";
    return `<pre class='payload'>${esc(content)}</pre>${trunc}`;
  }
  function hdrTable(h) {
    if (!h || typeof h !== "object") return "";
    const rows = Object.keys(h).map((k) =>
      `<tr><td class="k">${esc(k)}</td><td class="v">${esc(
        Array.isArray(h[k]) ? h[k].join(", ") : h[k])}</td></tr>`).join("");
    return `<table class="hdr">${rows}</table>`;
  }
  function seg(title, sub, inner, open) {
    const o = open === false ? "" : " open";
    return `<details class="seg"${o}><summary><span>${esc(title)}</span><span>${esc(sub || "")}</span></summary>
      <div class="body">${inner}</div></details>`;
  }

  // [MOC-184] 取 body 文本(同 bodyBlock 的内容,用于 diff / 复制)
  function bodyText(b) {
    if (!b || b.content == null) return "";
    return typeof b.content === "object" ? JSON.stringify(b.content, null, 2) : String(b.content);
  }

  // [MOC-184] OUTBOUND → curl(借鉴 claude-tap)。注:headers 已脱敏(authorization=***),
  // 复刻的是请求**形状**;真要重放上游需自行把凭据填回。
  function buildCurl(ob) {
    if (!ob || !ob.url) return "";
    const q = (s) => "'" + String(s).replace(/'/g, "'\\''") + "'";
    let parts = ["curl -X " + (ob.method || "POST").toUpperCase() + " " + q(ob.url)];
    const h = ob.headers || {};
    Object.keys(h).forEach((k) => {
      parts.push("-H " + q(k + ": " + (Array.isArray(h[k]) ? h[k].join(", ") : h[k])));
    });
    const body = bodyText(ob.body);
    if (body) parts.push("--data-raw " + q(body));
    return parts.join(" \\\n  ");
  }

  function copyText(s, btn) {
    if (btn && !btn.dataset.orig) btn.dataset.orig = btn.textContent; // 连点也只记真正原文一次
    const ok = () => {
      if (!btn) return;
      btn.classList.add("done"); btn.textContent = "已复制 ✓";
      clearTimeout(btn._restore);
      btn._restore = setTimeout(() => { btn.classList.remove("done"); btn.textContent = btn.dataset.orig; }, 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(s).then(ok, () => fallbackCopy(s, ok));
    } else { fallbackCopy(s, ok); }
  }
  function fallbackCopy(s, ok) {
    const ta = document.createElement("textarea");
    ta.value = s; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); ok(); } catch (_) {}
    document.body.removeChild(ta);
  }

  // [MOC-184] 行级 LCS diff(借鉴 claude-tap structural diff)。我们用 INBOUND↔OUTBOUND
  // 看 adapter 把 Codex 请求转成了啥(跨协议会偏吵,但正是要看的转换结果)。两侧 pretty JSON 文本;
  // 大体量降级避免 O(n·m) 爆。
  function diffLines(aText, bText) {
    if (!aText && !bText) return `<div class="meta">(两侧均无 body,无可 diff)</div>`;
    const a = aText.split("\n"), b = bText.split("\n");
    if (a.length > 1500 || b.length > 1500) {
      return `<div class="trunc">⚠ 体量过大(${a.length}/${b.length} 行),跳过 diff,看上面两段原文</div>`;
    }
    const n = a.length, m = b.length;
    const dp = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
    for (let i = n - 1; i >= 0; i--)
      for (let j = m - 1; j >= 0; j--)
        dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
    let i = 0, j = 0; const out = [];
    while (i < n && j < m) {
      if (a[i] === b[j]) { out.push(["ctx", "  " + a[i]]); i++; j++; }
      else if (dp[i + 1][j] >= dp[i][j + 1]) { out.push(["del", "- " + a[i]]); i++; }
      else { out.push(["add", "+ " + b[j]]); j++; }
    }
    while (i < n) out.push(["del", "- " + a[i++]]);
    while (j < m) out.push(["add", "+ " + b[j++]]);
    const lines = out.map(([t, l]) => `<span class="${t}">${esc(l)}</span>`).join("\n");
    return `<pre class="payload diff">${lines}</pre>`;
  }

  function renderDetail(t) {
    if (!t) { detailEl.innerHTML = "<div class='empty'>选择左侧一条记录查看详情</div>"; return; }
    const k = kindOf(t);
    if (k === "cat_webfetch") { renderCatWebfetch(t); return; }
    if (k !== "forward") {
      detailEl.innerHTML = `<div class="tools"><button data-copy="full">复制 JSON</button></div>`
        + `<pre class="payload">${esc(JSON.stringify(t, null, 2))}</pre>`;
      return;
    }
    const p = t.provider || {}, m = t.models || {}, ib = t.inbound || {}, ob = t.outbound || {}, rs = t.response || {};
    const meta = `provider: ${esc(p.id)} (${esc(p.api_format)} / ${esc(p.auth_scheme)}) · `
      + `models: ${esc(m.original)} → ${esc(m.resolved)} → ${esc(m.upstream)} · seq ${esc(t.seq)} · ${esc(t.captured_at)}`;
    detailEl.innerHTML = `<div class="meta">${meta}</div>`
      + `<div class="tools">`
      +   `<button data-copy="curl">复制 OUTBOUND curl</button>`
      +   `<button data-copy="ob">复制 OUTBOUND body</button>`
      +   `<button data-copy="ib">复制 INBOUND body</button>`
      + `</div>`
      + seg("INBOUND · Codex 原始请求", `${esc(ib.method)} ${esc(ib.client_path || "")}${ib.client_query ? "?" + esc(ib.client_query) : ""}`,
          hdrTable(ib.headers) + bodyBlock(ib.body))
      + seg("OUTBOUND · 转换后发上游", esc(ob.url || ""), hdrTable(ob.headers) + bodyBlock(ob.body))
      + seg("RESPONSE · 上游回包 (raw)", "status " + esc(rs.status), hdrTable(rs.headers) + bodyBlock(rs.body))
      + seg("DIFF · INBOUND → OUTBOUND(adapter 改了啥)", "红=移除 绿=新增 · 跨协议偏吵正常",
          diffLines(bodyText(ib.body), bodyText(ob.body)), false);
  }

  // MOC-181: cat-webfetch 链路详情(请求 / 抓取+升级链 / 摘要 prompt+响应 / 结果)。
  function renderCatWebfetch(t) {
    const r = t.request || {}, f = t.fetch || {}, s = t.summarize || {}, res = t.result || {};
    let html = `<div class="meta">tool: ${esc(t.tool)} · seq ${esc(t.seq)} · ${esc(t.captured_at)}</div>`;
    html += `<div class="tools"><button data-copy="full">复制 JSON</button></div>`;
    html += seg("请求 · request", esc(t.tool || ""), hdrTable(r));
    if (f && Object.keys(f).length) {
      const fcopy = Object.assign({}, f); delete fcopy.escalation_trail;
      let inner = hdrTable(fcopy);
      if (Array.isArray(f.escalation_trail) && f.escalation_trail.length) {
        inner += `<div class="meta">升级历程 escalation_trail:</div>`
          + `<pre class="payload">${esc(f.escalation_trail.join("\n"))}</pre>`;
      }
      html += seg("抓取 · fetch", esc(f.final_tier || f.backend || ""), inner);
    }
    if (s && Object.keys(s).length) {
      if (s.fallback_raw) {
        html += seg("摘要 · fallback(回退原文)", "未生成",
          `<pre class="payload">摘要未生成: ${esc(s.error || "")}</pre>`);
      } else {
        const scopy = Object.assign({}, s); delete scopy.prompt_sent; delete scopy.response;
        const inner = hdrTable(scopy)
          + `<div class="meta">prompt_sent(完整喂给摘要模型):</div>`
          + `<pre class="payload">${esc(s.prompt_sent || "")}</pre>`
          + `<div class="meta">response(摘要模型原始回复):</div>`
          + `<pre class="payload">${esc(s.response || "")}</pre>`;
        html += seg("摘要 · summarize", esc(s.model || ""), inner);
      }
    }
    html += seg("结果 · result", res.is_error ? "ERROR" : "ok", hdrTable(res));
    detailEl.innerHTML = html;
  }

  function add(t, prepend) {
    if (prepend) traces.unshift(t); else traces.push(t);
    if (traces.length > 1000) traces.length = 1000;
  }

  listEl.addEventListener("click", (e) => {
    const row = e.target.closest(".row");
    if (!row) return;
    selected = Number(row.dataset.seq);
    renderList();
    renderDetail(traces.find((t) => t.seq === selected));
  });
  // [MOC-184] 详情区复制按钮(委托):curl / OUTBOUND body / INBOUND body / 整条 JSON
  detailEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-copy]");
    if (!btn) return;
    const t = traces.find((x) => x.seq === selected);
    if (!t) return;
    const what = btn.dataset.copy;
    let s = "";
    if (what === "curl") s = buildCurl(t.outbound);
    else if (what === "ob") s = bodyText((t.outbound || {}).body) || JSON.stringify(t.outbound || {}, null, 2);
    else if (what === "ib") s = bodyText((t.inbound || {}).body) || JSON.stringify(t.inbound || {}, null, 2);
    else s = JSON.stringify(t, null, 2);
    copyText(s, btn);
  });
  $("#kind").addEventListener("change", renderList);
  $("#q").addEventListener("input", renderList);
  $("#clear").addEventListener("click", async () => {
    await fetch("/api/clear", { method: "POST" });
    traces = []; selected = null; renderList(); renderDetail(null);
  });

  async function loadHistory() {
    try {
      const r = await fetch("/api/traces");
      const arr = await r.json();
      traces = arr.slice().reverse();   // 后端 oldest→newest;UI 最新在上
      renderList();
    } catch (e) { /* 服务未就绪,SSE 会补 */ }
  }

  function connect() {
    const es = new EventSource("/api/stream");
    es.onopen = () => { liveEl.classList.add("on"); liveTxt.textContent = "实时"; };
    es.onerror = () => { liveEl.classList.remove("on"); liveTxt.textContent = "重连中…"; };
    es.onmessage = (ev) => {
      try { add(JSON.parse(ev.data), true); renderList(); } catch (_) {}
    };
    es.addEventListener("lagged", () => { loadHistory(); });  // 落后 → resync
  }

  loadHistory();
  connect();
})();
</script>
</body>
</html>
